name: Build Atlas Kernel
on:
  push:
    branches: [master]
  workflow_dispatch:
env:
  CLANG_DIR: /tmp/aosp-clang
  AK3_DIR: /tmp/atlas-ak3
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq git ccache lz4 libssl-dev device-tree-compiler python3 bison flex bc libelf-dev gcc-aarch64-linux-gnu

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Download AOSP Clang
        run: |
          mkdir -p "$CLANG_DIR"
          for i in 1 2 3; do
            wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz -O "$CLANG_DIR"/clang.tar.gz && break
            sleep 10
          done
          test -f "$CLANG_DIR"/clang.tar.gz || { echo "::error::Clang download failed"; exit 1; }
          tar -xf "$CLANG_DIR"/clang.tar.gz -C "$CLANG_DIR"
          rm "$CLANG_DIR"/clang.tar.gz
          $CLANG_DIR/bin/clang --version | head -1

      - name: Configure kernel
        run: |
          make ARCH=arm64 exynos850-a21snsxx_defconfig || { echo "::error::Defconfig failed"; exit 1; }

      - name: Build kernel
        run: |
          export CCACHE_DIR=~/.ccache
          make ARCH=arm64 CC="ccache $CLANG_DIR/bin/clang" \
            LD=$CLANG_DIR/bin/ld.lld \
            AR=$CLANG_DIR/bin/llvm-ar \
            NM=$CLANG_DIR/bin/llvm-nm \
            OBJCOPY=$CLANG_DIR/bin/llvm-objcopy \
            OBJDUMP=$CLANG_DIR/bin/llvm-objdump \
            STRIP=$CLANG_DIR/bin/llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc)
          test -f arch/arm64/boot/Image || { echo "::error::Image not built"; exit 1; }
          ccache -s

      - name: Package AnyKernel3
        run: |
          mkdir -p "$AK3_DIR"
          cp -a anykernel3-base/* "$AK3_DIR"/
          cp arch/arm64/boot/Image "$AK3_DIR"/Image
          for f in arch/arm64/boot/dts/exynos/exynos3830*.dtb; do [ -f "$f" ] && cat "$f"; done > "$AK3_DIR"/dtb
          test -s "$AK3_DIR"/dtb || { for f in arch/arm64/boot/dts/exynos/*.dtb; do [ -f "$f" ] && cat "$f"; done > "$AK3_DIR"/dtb; }
          test -s "$AK3_DIR"/dtb || echo "::warning::No DTB found"
                    sed -i 's#^kernel.string=.*#kernel.string=Atlas Kernel by DaemonMCR (@thomas_turner36)#' "$AK3_DIR"/anykernel.sh
          sed -i 's/^device.name1=.*/device.name1=a21s/' "$AK3_DIR"/anykernel.sh
          cd "$AK3_DIR" && zip -r9 "$GITHUB_WORKSPACE"/atlas-nexun.zip . -x .git

      - uses: actions/upload-artifact@v4
        with:
          name: atlas-nexun
          path: ${{ github.workspace }}/atlas-nexun.zip
          retention-days: 7